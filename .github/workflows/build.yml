name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target k4SideChain_VST3 --parallel

      - name: Locate VST3 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "VST3_DIR=build/k4SideChain_artefacts/Release/VST3" >> "$GITHUB_ENV"

      - name: Locate VST3 (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: echo "VST3_DIR=build/k4SideChain_artefacts/Release/VST3" >> "$GITHUB_ENV"

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: k4SideChain-${{ matrix.name }}-VST3
          path: ${{ env.VST3_DIR }}/*.vst3
          if-no-files-found: error
